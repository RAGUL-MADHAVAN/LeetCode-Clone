version: "3.8"

services:
  # ───────────────────────────────────────
  # MongoDB Database
  # ───────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # ───────────────────────────────────────
  # Backend API (Express.js)
  # ───────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/temp:/app/temp
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/leetcode-clone
      - JWT_SECRET=leetcode_clone_jwt_secret_dev_key_2024
      - JUDGE0_URL=http://judge0-server:2358
      - HOST_TEMP_DIR=/host_mnt/c/Users/ragul/CodeArena_Cloned/backend/temp
    depends_on:
      - mongodb
    restart: unless-stopped

  # ───────────────────────────────────────
  # Frontend (Vite + React)
  # ───────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

  # ───────────────────────────────────────
  # Judge0 Server
  # ───────────────────────────────────────
  judge0-server:
    image: judge0/judge0:latest
    ports:
      - "2358:2358"
    privileged: true
    environment:
      - REDIS_HOST=judge0-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=judge0redispass
      - POSTGRES_HOST=judge0-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=judge0
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0dbpass
      - RAILS_ENV=production
    depends_on:
      - judge0-db
      - judge0-redis
    restart: unless-stopped

  judge0-workers:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    privileged: true
    environment:
      - REDIS_HOST=judge0-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=judge0redispass
      - POSTGRES_HOST=judge0-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=judge0
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0dbpass
      - RAILS_ENV=production
    depends_on:
      - judge0-server
    restart: unless-stopped

  # ───────────────────────────────────────
  # Judge0 PostgreSQL
  # ───────────────────────────────────────
  judge0-db:
    image: postgres:16
    environment:
      - POSTGRES_DB=judge0
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0dbpass
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ───────────────────────────────────────
  # Judge0 Redis
  # ───────────────────────────────────────
  judge0-redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "judge0redispass"]
    restart: unless-stopped

  # ───────────────────────────────────────
  # Monitoring (Prometheus + Grafana)
  # ───────────────────────────────────────
  prometheus:
    build: ./monitoring
    image: custom-prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mongodb_data:
  judge0_postgres_data:
